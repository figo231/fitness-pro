<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fitness Pro - اشتراكي</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Fitness Pro">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --lime: #aee032;
      --lime-bright: #c4f135;
      --ink: #0d0d0d;
      --ink-soft: #161616;
      --card: #141414;
      --border: #2a2e1a;
    }
    html, body {
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    }
    body {
      background: radial-gradient(circle at 50% 0%, #1c1f10 0%, #0d0d0d 55%);
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== Light mode ===== */
    body.light { background: #f2f2f2; color: #111; }
    body.light .card, body.light .grid-card, body.light .status-card { background: #fff; border-color: #ddd; }
    body.light input[type="tel"] { background: #f5f5f5; border-color: #ccc; color: #111; }
    body.light .status-lbl { color: #555; }
    body.light .renew-lbl { color: #666; }
    body.light .page-card { background: #fff; border-color: #ddd; color: #111; }
    body.light .topbar { background: #fff; border-color: var(--lime); }
    body.light .topbar h1 { color: #2f4400; }

    /* ===================== LOGIN SCREEN ===================== */
    #loginScreen {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .login-box { width: 100%; max-width: 380px; text-align: center; }
    .login-box img { width: 130px; height: 130px; object-fit: contain; margin-bottom: 6px; filter: drop-shadow(0 6px 16px rgba(174,224,50,0.25)); }
    .login-box p.sub { color: #999; font-size: 14px; margin-bottom: 22px; }
    .card {
      background: var(--card); border: 1px solid #2c2c2c; border-top: 3px solid var(--lime);
      border-radius: 18px; padding: 26px 22px; text-align: right;
    }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-size: 13px; color: #bbb; margin-bottom: 8px; }
    input[type="tel"] {
      width: 100%; padding: 14px 16px; border-radius: 12px; border: 1px solid #333;
      background: #1c1c1c; color: #fff; font-size: 16px; outline: none;
      direction: ltr; text-align: center; letter-spacing: 1px;
    }
    input[type="tel"]:focus { border-color: var(--lime); box-shadow: 0 0 0 3px rgba(174,224,50,0.15); }
    button { border: none; cursor: pointer; border-radius: 12px; font-weight: 700; transition: transform .1s, background .2s; }
    button:active { transform: scale(0.98); }
    .btn-main {
      width: 100%; padding: 14px; background: var(--lime); color: var(--ink); font-size: 16px; margin-top: 4px;
    }
    .btn-main:hover { background: var(--lime-bright); }
    .btn-main:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg {
      background: #3a1414; color: #ff8080; border: 1px solid #5c1f1f; padding: 12px 14px;
      border-radius: 10px; font-size: 14px; margin-top: 14px; display: none;
    }
    .spinner {
      width: 16px; height: 16px; border: 2px solid #333; border-top-color: var(--ink);
      border-radius: 50%; animation: spin .7s linear infinite; display: inline-block; vertical-align: middle; margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===================== HOME SCREEN ===================== */
    #homeScreen { display: none; flex: 1; flex-direction: column; padding: 22px 18px 10px; max-width: 460px; margin: 0 auto; width: 100%; }

    .home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .menu-dots { display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
    .menu-dots span { width: 20px; height: 2.5px; background: var(--lime); border-radius: 2px; }
    .bell-icon { font-size: 20px; color: var(--lime); cursor: pointer; }

    .logo-area { text-align: center; margin: 6px 0 22px; }
    .logo-area img { width: 110px; height: 110px; object-fit: contain; filter: drop-shadow(0 6px 16px rgba(174,224,50,0.25)); }

    .status-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 18px;
      padding: 22px 18px; display: flex; align-items: center; gap: 18px; margin-bottom: 18px;
    }
    .shield-wrap { flex-shrink: 0; }
    .shield-wrap svg { width: 64px; height: 70px; display: block; }
    .status-divider { width: 1px; align-self: stretch; background: #2c2c2c; }
    .status-info { flex: 1; text-align: center; }
    .status-lbl { font-size: 13px; color: #aaa; margin-bottom: 6px; }
    .status-value { font-size: 19px; font-weight: 800; margin-bottom: 10px; }
    .status-value.active { color: var(--lime-bright); }
    .status-value.expiring_soon { color: #fbbf24; }
    .status-value.expired { color: #f87171; }
    .renew-divider { height: 1px; background: #2c2c2c; margin: 8px 0; }
    .renew-lbl { font-size: 11.5px; color: #888; margin-bottom: 2px; }
    .renew-date { font-size: 14px; font-weight: 700; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
    .grid-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 24px 10px; text-align: center; cursor: pointer; transition: transform .12s, border-color .2s;
    }
    .grid-card:active { transform: scale(0.96); }
    .grid-card:hover { border-color: var(--lime); }
    .grid-card .icon { font-size: 30px; color: var(--lime); margin-bottom: 10px; display: block; }
    .grid-card .lbl { font-size: 13.5px; font-weight: 600; }

    .change-number {
      text-align: center; font-size: 12.5px; color: #777; margin: 10px 0 18px; cursor: pointer; text-decoration: underline;
    }

    /* ===================== SUB PAGES ===================== */
    #subPageScreen { display: none; flex: 1; flex-direction: column; padding: 18px; max-width: 460px; margin: 0 auto; width: 100%; }
    .topbar {
      display: flex; align-items: center; gap: 12px; background: var(--ink-soft);
      border-bottom: 2px solid var(--lime); padding: 14px 16px; border-radius: 14px; margin-bottom: 20px;
    }
    .back-arrow { font-size: 20px; color: var(--lime); cursor: pointer; }
    .topbar h1 { font-size: 16px; color: var(--lime-bright); }
    .page-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 16px;
      padding: 28px 20px; text-align: center; color: #ddd; line-height: 1.9; font-size: 14.5px;
    }
    .page-card .big-icon { font-size: 40px; margin-bottom: 14px; display: block; }
    .page-card a { color: var(--lime-bright); font-weight: 700; text-decoration: none; }

    /* ===== Floating Buttons ===== */
    .floating-btns { position: fixed; bottom: 20px; left: 16px; display: flex; flex-direction: column; gap: 10px; z-index: 999; }
    .fab {
      width: 46px; height: 46px; border-radius: 50%; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center; font-size: 20px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.4); transition: transform .2s, box-shadow .2s; text-decoration: none;
    }
    .fab:hover { transform: scale(1.12); }
    .fab-wa { background: #25d366; color: #fff; }
    .fab-coach { background: var(--lime); color: var(--ink); font-size: 26px; width: 58px; height: 58px; }
    .fab-mode { background: #2c2c2c; color: #ffd400; font-size: 18px; }
    .fab-install { background: var(--lime); color: var(--ink); font-size: 18px; display: flex; }
    body.light .fab-mode { background: #e0e0e0; color: #333; }
    .fab-wrap { position: relative; }
    .fab-wrap .tip {
      position: absolute; left: 54px; top: 50%; transform: translateY(-50%); background: #222; color: #fff;
      font-size: 12px; padding: 5px 10px; border-radius: 8px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    .fab-wrap:hover .tip { opacity: 1; }

    /* Footer */
    footer.credit {
      width: 100%; text-align: center; padding: 16px 20px 26px; font-size: 12px; color: #555;
      letter-spacing: .4px; margin-top: auto;
    }
  </style>
</head>
<body>

  <!-- ===================== LOGIN SCREEN ===================== -->
  <div id="loginScreen">
    <div class="login-box">
      <img src="logo.png" alt="Fitness Pro">
      <p class="sub">تابع حالة اشتراكك بسهولة</p>
      <div class="card">
        <div class="form-group">
          <label for="phoneInput">رقم التليفون</label>
          <input type="tel" id="phoneInput" placeholder="01xxxxxxxxx" inputmode="numeric">
        </div>
        <button class="btn-main" id="checkBtn" onclick="checkSubscription()">دخول</button>
        <div class="error-msg" id="errorMsg"></div>
      </div>
    </div>
  </div>

  <!-- ===================== HOME SCREEN ===================== -->
  <div id="homeScreen">
    <div class="home-header">
      <div class="menu-dots"><span></span><span></span><span></span></div>
      <span class="bell-icon" onclick="openSubPage('alerts')">🔔</span>
    </div>

    <div class="logo-area"><img src="logo.png" alt="Fitness Pro"></div>

    <div class="status-card">
      <div class="shield-wrap">
        <svg viewBox="0 0 64 70" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path id="shieldPath" d="M32 2 L60 12 V32 C60 50 48 62 32 68 C16 62 4 50 4 32 V12 Z" stroke="#aee032" stroke-width="3.5" fill="rgba(174,224,50,0.06)"/>
          <path id="checkPath" d="M19 35 L28 44 L46 24" stroke="#aee032" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div class="status-divider"></div>
      <div class="status-info">
        <div class="status-lbl">حالة الاشتراك</div>
        <div class="status-value" id="statusValue">-</div>
        <div class="renew-divider"></div>
        <div class="renew-lbl" id="renewLbl">تاريخ نهاية الاشتراك</div>
        <div class="renew-date" id="renewDate">-</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="grid-card" onclick="openSubPage('programs')">
        <span class="icon">🏋️</span>
        <div class="lbl">برامجي التدريبية</div>
      </div>
      <div class="grid-card" onclick="openSubPage('subscription')">
        <span class="icon">📅</span>
        <div class="lbl">الاشتراكات</div>
      </div>
      <div class="grid-card" onclick="openSubPage('progress')">
        <span class="icon">📶</span>
        <div class="lbl">تقدمي</div>
      </div>
      <div class="grid-card" onclick="openSubPage('alerts')">
        <span class="icon">🔔</span>
        <div class="lbl">التنبيهات</div>
      </div>
    </div>

    <div class="change-number" onclick="changeNumber()">تغيير رقم التليفون</div>
  </div>

  <!-- ===================== SUB PAGE SCREEN ===================== -->
  <div id="subPageScreen">
    <div class="topbar">
      <span class="back-arrow" onclick="closeSubPage()">→</span>
      <h1 id="subPageTitle">العنوان</h1>
    </div>
    <div class="page-card" id="subPageContent"></div>
  </div>

  <!-- Footer -->
  <footer class="credit">
    تصميم <span style="color: var(--lime); font-weight: 600;">كريم محمد</span> &nbsp;|&nbsp; <span style="color: var(--lime); font-weight: 600;">Kareem Mohamed</span>
  </footer>

  <!-- Floating Buttons -->
  <div class="floating-btns">
    <div class="fab-wrap">
      <a class="fab fab-coach" href="https://wa.me/201040757533" target="_blank" title="تواصل مع الكابتن يحيى">🏋️</a>
      <span class="tip">تواصل مع الكابتن يحيى</span>
    </div>
    <div class="fab-wrap">
      <a class="fab fab-wa" href="https://wa.me/201022390517" target="_blank" title="تواصل مع المطور">💬</a>
      <span class="tip">تواصل مع المطور</span>
    </div>
    <div class="fab-wrap">
      <button class="fab fab-mode" onclick="toggleMode()" id="modeBtn">🌙</button>
      <span class="tip">تغيير الوضع</span>
    </div>
    <div class="fab-wrap">
      <button class="fab fab-install" id="installBtn" style="display:none;" title="تثبيت الأبليكيشن">⬇️</button>
      <span class="tip">تثبيت الأبليكيشن</span>
    </div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbwIo3cIoygd33qf1WjuzReVdkL6LL7zYJOkYTm0G9Ve9Cd4BNTC1d0Eq70AXav_N6uMbg/exec";
    let currentMember = null;

    window.addEventListener('DOMContentLoaded', () => {
      const savedPhone = localStorage.getItem('fpPhone');
      if (savedPhone) {
        loadMember(savedPhone, true);
      }
    });

    async function checkSubscription() {
      const phone = document.getElementById('phoneInput').value.trim();
      const errorMsg = document.getElementById('errorMsg');
      const checkBtn = document.getElementById('checkBtn');
      errorMsg.style.display = 'none';
      if (!phone) {
        errorMsg.textContent = 'من فضلك أدخل رقم التليفون';
        errorMsg.style.display = 'block';
        return;
      }
      checkBtn.disabled = true;
      checkBtn.innerHTML = 'جاري البحث... <span class="spinner"></span>';
      const ok = await loadMember(phone, false);
      checkBtn.disabled = false;
      checkBtn.textContent = 'دخول';
      if (ok) {
        localStorage.setItem('fpPhone', phone);
      }
    }

    async function loadMember(phone, silentFail) {
      const errorMsg = document.getElementById('errorMsg');
      try {
        const res = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getMemberStatus', phone }) });
        const data = await res.json();
        if (data.success) {
          currentMember = data.member;
          showHome(data.member);
          return true;
        } else {
          if (silentFail) {
            localStorage.removeItem('fpPhone');
          } else {
            errorMsg.textContent = data.message || 'حصل خطأ';
            errorMsg.style.display = 'block';
          }
          return false;
        }
      } catch (e) {
        if (!silentFail) {
          errorMsg.textContent = 'فشل الاتصال بالسيرفر، حاول تاني';
          errorMsg.style.display = 'block';
        }
        return false;
      }
    }

    function showHome(m) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('subPageScreen').style.display = 'none';
      document.getElementById('homeScreen').style.display = 'flex';

      const statusValue = document.getElementById('statusValue');
      const renewDate = document.getElementById('renewDate');
      const renewLbl = document.getElementById('renewLbl');
      const shieldPath = document.getElementById('shieldPath');
      const checkPath = document.getElementById('checkPath');

      statusValue.className = 'status-value ' + m.status;
      renewDate.textContent = arabicDate(m.endDate);

      if (m.status === 'active') {
        statusValue.textContent = 'نشط';
        renewLbl.textContent = 'تاريخ نهاية الاشتراك';
        shieldPath.setAttribute('stroke', '#aee032');
        checkPath.setAttribute('stroke', '#aee032');
        checkPath.style.display = 'block';
      } else if (m.status === 'expiring_soon') {
        statusValue.textContent = 'قريب الانتهاء';
        renewLbl.textContent = 'تاريخ نهاية الاشتراك';
        shieldPath.setAttribute('stroke', '#fbbf24');
        checkPath.setAttribute('stroke', '#fbbf24');
        checkPath.style.display = 'block';
      } else if (m.status === 'expired') {
        statusValue.textContent = 'منتهي';
        renewLbl.textContent = 'انتهى بتاريخ';
        shieldPath.setAttribute('stroke', '#f87171');
        checkPath.style.display = 'none';
      } else {
        statusValue.textContent = 'غير معروف';
        checkPath.style.display = 'none';
      }
    }

    function changeNumber() {
      localStorage.removeItem('fpPhone');
      currentMember = null;
      document.getElementById('homeScreen').style.display = 'none';
      document.getElementById('subPageScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('phoneInput').value = '';
      document.getElementById('errorMsg').style.display = 'none';
    }

    function arabicDate(d) {
      if (!d) return '-';
      const p = d.split('-');
      if (p.length !== 3) return d;
      const months = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
      return parseInt(p[2]) + ' ' + months[parseInt(p[1])-1] + ' ' + p[0];
    }

    document.getElementById('phoneInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') checkSubscription();
    });

    const subPages = {
      programs: {
        title: 'برامجي التدريبية',
        icon: '🏋️',
        html: 'الميزة دي هتتفعل قريباً إن شاء الله 💪<br><br>تقدر تتواصل مع الكوتش بتاعك في الجيم لمعرفة برنامجك الحالي.'
      },
      subscription: {
        title: 'الاشتراكات',
        icon: '📅',
        html: ''
      },
      progress: {
        title: 'تقدمي',
        icon: '📶',
        html: 'متابعة التقدم هتكون متاحة قريباً 📈<br><br>تقدر تسأل الكوتش بتاعك عن قياساتك وتقدمك الحالي في الجيم.'
      },
      alerts: {
        title: 'التنبيهات',
        icon: '🔔',
        html: 'مفيش تنبيهات جديدة دلوقتي 🔕<br><br>هنبلغك هنا بأي تحديثات أو تذكيرات تخص اشتراكك.'
      }
    };

    function openSubPage(key) {
      const page = subPages[key];
      if (!page) return;

      document.getElementById('homeScreen').style.display = 'none';
      document.getElementById('subPageScreen').style.display = 'flex';
      document.getElementById('subPageTitle').textContent = page.title;

      let bodyHtml = page.html;
      if (key === 'subscription' && currentMember) {
        const labels = { active:'نشط', expiring_soon:'قريب الانتهاء', expired:'منتهي' };
        bodyHtml = `
          <div style="text-align:right; line-height:2.2;">
            <div><b>الاسم:</b> ${escHtml(currentMember.name)}</div>
            <div><b>الحالة:</b> ${labels[currentMember.status] || '-'}</div>
            ${currentMember.planType ? `<div><b>نوع الاشتراك:</b> ${escHtml(currentMember.planType)}</div>` : ''}
            <div><b>تاريخ البداية:</b> ${arabicDate(currentMember.startDate)}</div>
            <div><b>تاريخ النهاية:</b> ${arabicDate(currentMember.endDate)}</div>
          </div>`;
      }

      document.getElementById('subPageContent').innerHTML = `<span class="big-icon">${page.icon}</span>${bodyHtml}`;
    }

    function closeSubPage() {
      document.getElementById('subPageScreen').style.display = 'none';
      document.getElementById('homeScreen').style.display = 'flex';
    }

    function escHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function toggleMode() {
      const isLight = document.body.classList.toggle('light');
      document.getElementById('modeBtn').textContent = isLight ? '☀️' : '🌙';
      localStorage.setItem('fpMode', isLight ? 'light' : 'dark');
    }
    if (localStorage.getItem('fpMode') === 'light') {
      document.body.classList.add('light');
      document.getElementById('modeBtn').textContent = '☀️';
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'flex';
    });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });
    window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });
  </script>
</body>
</html>
